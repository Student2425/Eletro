<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELECTRO | The Aesthetic Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { surface: '#030303', glass: 'rgba(20, 20, 20, 0.6)', borderGlass: 'rgba(255, 255, 255, 0.08)', accent: '#ffffff' } } } }
    </script>
    <style>
        body { background-color: #000; color: #f5f5f7; overflow-x: hidden; scroll-behavior: smooth; font-family: 'Inter', sans-serif; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(24px); border: 1px solid var(--borderGlass); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .nav-blur { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(30px); border-bottom: 1px solid var(--borderGlass); }
        .track-mega { letter-spacing: 0.25em; }
        input, select, textarea { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px 0; outline: none; transition: border-color 0.3s ease; }
        input:focus { border-bottom-color: white; }
        .drawer { transform: translateX(100%); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .drawer.open { transform: translateX(0); }
        #overlay { opacity: 0; pointer-events: none; transition: opacity 0.5s ease; background: rgba(0,0,0,0.85); z-index: 100; }
        #overlay.open { opacity: 1; pointer-events: auto; }
        .card-container { perspective: 1000px; width: 100%; max-width: 320px; height: 180px; margin: 0 auto 2rem; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; position: relative; }
        .card-container.flip .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); padding: 1.5rem; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.01)); }
        .card-back { transform: rotateY(180deg); }
        .checkmark-circle { stroke-dasharray: 166; stroke-dashoffset: 166; stroke-width: 2; stroke: #4ade80; fill: none; animation: stroke 0.6s forwards; }
        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <div id="overlay" class="fixed inset-0" onclick="closeAllDrawers()"></div>
    <div id="toast-container" class="fixed top-24 left-1/2 -translate-x-1/2 z-[500] flex flex-col gap-3"></div>

    <nav class="nav-blur fixed top-0 w-full z-50">
        <div class="max-w-[1400px] mx-auto px-6 flex justify-between items-center h-20">
            <div class="text-xl font-light track-mega cursor-pointer" onclick="navigate('home')">ELECTR<span class="font-bold">O</span></div>
            <div class="flex items-center gap-6">
                <div id="auth-section" class="text-[10px] uppercase track-mega font-bold text-gray-400"></div>
                <button onclick="openProfile()" id="prof-btn" class="hidden text-gray-400 hover:text-white"><i class="fa-regular fa-user text-lg"></i></button>
                <button onclick="openCart()" class="relative text-gray-400 hover:text-white">
                    <i class="fa-solid fa-bag-shopping text-lg"></i>
                    <span id="cart-badge" class="absolute -top-2 -right-2 bg-white text-black text-[9px] h-4 w-4 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-20 min-h-screen">
        <section id="view-home" class="view-section px-6 md:px-12 py-10">
            <div class="mb-16 text-center">
                <h1 class="text-5xl md:text-7xl font-hairline tracking-tighter mb-4">PURE VISION.</h1>
                <p class="text-[10px] uppercase track-mega text-gray-500">The Aesthetic of Future Tech</p>
            </div>
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

        <section id="view-login" class="view-section hidden flex items-center justify-center min-h-[80vh]">
            <div class="glass-panel p-12 w-full max-w-md rounded-[2rem] text-center">
                <h2 class="text-xl font-light track-mega uppercase mb-8">Login</h2>
                <form onsubmit="handleAuth(event)" class="space-y-6 text-left">
                    <input type="text" id="login-u" placeholder="Username" required class="w-full">
                    <input type="password" id="login-p" placeholder="Password" required class="w-full">
                    <button class="w-full bg-white text-black py-4 rounded-full font-bold uppercase text-[10px] track-mega mt-4">Authenticate</button>
                </form>
            </div>
        </section>

        <section id="view-admin" class="view-section hidden px-6 md:px-12 py-10">
            <div class="flex justify-between items-center border-b border-white/10 pb-6 mb-10">
                <h2 class="text-3xl font-light tracking-tight">COMMAND CENTER</h2>
                <button onclick="logout()" class="text-red-500 text-[10px] uppercase track-mega">Logout</button>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div>
                    <h3 class="text-xs uppercase track-mega mb-6 text-gray-500">Live Orders</h3>
                    <div id="admin-orders" class="space-y-4"></div>
                </div>
                <div>
                    <h3 class="text-xs uppercase track-mega mb-6 text-gray-500">Inventory</h3>
                    <div id="admin-inventory" class="glass-panel rounded-2xl divide-y divide-white/5"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="cart-drawer" class="drawer fixed top-0 right-0 h-full w-full md:w-[400px] bg-[#050505] z-[150] flex flex-col p-8 border-l border-white/5 shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <span class="text-[10px] uppercase track-mega text-gray-500">Your Bag</span>
            <button onclick="closeAllDrawers()"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div id="cart-items" class="flex-grow space-y-6 overflow-y-auto"></div>
        <div class="mt-auto pt-6 border-t border-white/10">
            <div id="checkout-form" class="hidden space-y-4 mb-6">
                <input type="text" id="c-name" placeholder="Full Name" class="w-full text-sm">
                <input type="text" id="c-addr" placeholder="Address" class="w-full text-sm">
                <input type="tel" id="c-phone" placeholder="Phone" maxlength="10" class="w-full text-sm">
            </div>
            <div class="flex justify-between items-end mb-6">
                <span class="text-[10px] uppercase text-gray-500">Total</span>
                <span id="cart-total" class="text-2xl font-light">₹0</span>
            </div>
            <button id="checkout-btn" onclick="openPayment()" class="w-full bg-white text-black py-4 rounded-full font-bold text-[10px] uppercase track-mega">Proceed</button>
        </div>
    </div>

    <div id="profile-drawer" class="drawer fixed top-0 right-0 h-full w-full md:w-[400px] bg-[#050505] z-[150] p-8 border-l border-white/5">
        <div class="flex justify-between items-center mb-10">
            <span class="text-[10px] uppercase track-mega text-gray-500">Profile</span>
            <button onclick="closeAllDrawers()"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <form onsubmit="saveProfile(event)" class="space-y-6">
            <input type="text" id="p-name" placeholder="Name" required class="w-full text-sm">
            <input type="tel" id="p-phone" placeholder="Phone" maxlength="10" required class="w-full text-sm">
            <textarea id="p-addr" placeholder="Address" class="w-full text-sm py-2"></textarea>
            <button class="w-full bg-white text-black py-4 rounded-full font-bold text-[10px] uppercase track-mega">Save Identity</button>
        </form>
    </div>

    <div id="modal-pay" class="fixed inset-0 z-[400] hidden items-center justify-center p-4 bg-black/80 backdrop-blur-xl">
        <div class="glass-panel p-8 md:p-12 w-full max-w-md rounded-[2.5rem] relative text-center">
            <button onclick="closeModal('modal-pay')" class="absolute top-6 right-6 text-gray-500"><i class="fa-solid fa-xmark"></i></button>
            <div id="pay-content">
                <h2 class="text-2xl font-light mb-8 uppercase tracking-widest">Verify Payment</h2>
                
                <div class="card-container" id="card-obj">
                    <div class="card-inner">
                        <div class="card-front flex flex-col justify-between text-left">
                            <i class="fa-solid fa-microchip text-2xl text-gray-400"></i>
                            <div id="v-num" class="font-mono tracking-widest">XXXX XXXX XXXX XXXX</div>
                            <div id="v-name" class="text-[10px] uppercase">USER NAME</div>
                        </div>
                        <div class="card-back flex items-center justify-center">
                            <div class="bg-white text-black px-4 py-1 rounded font-mono" id="v-cvv">***</div>
                        </div>
                    </div>
                </div>

                <div class="space-y-4 mb-8">
                    <input type="text" id="in-num" placeholder="Card Number" maxlength="16" oninput="updateCard()" class="w-full text-center tracking-widest">
                    <div class="flex gap-4">
                        <input type="text" id="in-exp" placeholder="MM/YY" maxlength="5" class="w-full text-center">
                        <input type="password" id="in-cvv" placeholder="CVV" maxlength="3" onfocus="flip(true)" onblur="flip(false)" oninput="updateCard()" class="w-full text-center">
                    </div>
                </div>
                <button onclick="finalizeOrder()" class="w-full bg-white text-black py-4 rounded-full font-bold uppercase text-[10px] track-mega">Confirm ₹<span id="pay-total">0</span></button>
            </div>

            <div id="pay-success" class="hidden py-10">
                <svg class="w-16 h-16 mx-auto mb-6" viewBox="0 0 52 52"><circle class="checkmark-circle" cx="26" cy="26" r="25"/><path class="text-green-400" stroke-width="3" fill="none" d="M14 27l7 7 16-16" stroke="#4ade80"/></svg>
                <h3 class="text-2xl font-light mb-4">Verified</h3>
                <button onclick="window.location.reload()" class="border border-white/20 px-8 py-2 rounded-full text-[10px] uppercase">Finish</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            user: JSON.parse(localStorage.getItem('user')) || null,
            cart: [],
            orders: JSON.parse(localStorage.getItem('orders')) || [],
            products: [
                { id: 1, name: 'Aura Master X', price: 45000, img: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800' },
                { id: 2, name: 'Zenith Display', price: 89000, img: 'https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=800' }
            ]
        };

        // NAVIGATION
        function navigate(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
            if(v==='home') renderHome();
            if(v==='admin') renderAdmin();
            window.scrollTo(0,0);
        }

        function updateNavbar() {
            const auth = document.getElementById('auth-section');
            const profBtn = document.getElementById('prof-btn');
            if(!state.user) {
                auth.innerHTML = `<button onclick="navigate('login')">Sign In</button>`;
                profBtn.style.display = 'none';
            } else {
                auth.innerHTML = state.user.role === 'admin' ? 'Console' : state.user.name || state.user.username;
                profBtn.style.display = state.user.role === 'admin' ? 'none' : 'block';
            }
        }

        function handleAuth(e) {
            e.preventDefault();
            const u = document.getElementById('login-u').value;
            const p = document.getElementById('login-p').value;
            if(u === 'admin' && p === '20190126550') state.user = { name: 'Admin', role: 'admin' };
            else state.user = { name: u, role: 'user' };
            localStorage.setItem('user', JSON.stringify(state.user));
            updateNavbar();
            navigate(state.user.role === 'admin' ? 'admin' : 'home');
        }

        function logout() { localStorage.removeItem('user'); window.location.reload(); }

        // STORE
        function renderHome() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = state.products.map(p => `
                <div class="glass-panel p-6 rounded-[2rem] text-center flex flex-col items-center">
                    <img src="${p.img}" class="w-full h-48 object-cover rounded-xl mb-6">
                    <h3 class="font-light mb-2 uppercase text-sm">${p.name}</h3>
                    <p class="text-accent font-bold mb-6">₹${p.price.toLocaleString()}</p>
                    <button onclick="addToCart(${p.id})" class="w-full py-3 bg-white text-black rounded-full font-bold text-[9px] uppercase tracking-widest">Add to Bag</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = state.products.find(x => x.id === id);
            state.cart.push(p);
            updateCart();
            openCart();
        }

        function updateCart() {
            document.getElementById('cart-badge').innerText = state.cart.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = state.cart.map((i, idx) => `
                <div class="flex items-center gap-4">
                    <img src="${i.img}" class="w-16 h-16 object-cover rounded-lg">
                    <div class="flex-grow">
                        <p class="text-xs uppercase">${i.name}</p>
                        <button onclick="remove(${idx})" class="text-[9px] text-red-500 uppercase">Remove</button>
                    </div>
                    <p class="text-sm">₹${i.price.toLocaleString()}</p>
                </div>
            `).join('');
            const total = state.cart.reduce((a,b) => a + b.price, 0);
            document.getElementById('cart-total').innerText = '₹' + total.toLocaleString();
            document.getElementById('pay-total').innerText = total.toLocaleString();
        }

        function remove(idx) { state.cart.splice(idx,1); updateCart(); }

        // CHECKOUT
        function openCheckoutDetails() {
            if(!state.user) return navigate('login');
            document.getElementById('checkout-form').classList.remove('hidden');
            document.getElementById('checkout-btn').onclick = () => {
                const n = document.getElementById('c-name').value;
                const a = document.getElementById('c-addr').value;
                if(n.length < 3 || a.length < 5) return alert('Enter correct details');
                document.getElementById('modal-pay').classList.remove('hidden');
                document.getElementById('modal-pay').classList.add('flex');
            };
        }

        function finalizeOrder() {
            if(document.getElementById('in-num').value.length !== 16) return alert('Invalid Card');
            document.getElementById('pay-content').classList.add('hidden');
            document.getElementById('pay-success').classList.remove('hidden');
            const order = { id: Date.now(), user: document.getElementById('c-name').value, total: state.cart.reduce((a,b)=>a+b.price,0) };
            state.orders.push(order);
            localStorage.setItem('orders', JSON.stringify(state.orders));
        }

        // UI HELPERS
        function updateCard() {
            document.getElementById('v-num').innerText = document.getElementById('in-num').value || 'XXXX XXXX XXXX XXXX';
            document.getElementById('v-cvv').innerText = document.getElementById('in-cvv').value || '***';
        }
        function flip(b) { document.getElementById('card-obj').classList.toggle('flip', b); }
        function openCart() { document.getElementById('cart-drawer').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
        function openProfile() { document.getElementById('profile-drawer').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
        function closeAllDrawers() { document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('open')); document.getElementById('overlay').classList.remove('open'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function saveProfile(e) { e.preventDefault(); state.user.name = document.getElementById('p-name').value; state.user.phone = document.getElementById('p-phone').value; localStorage.setItem('user', JSON.stringify(state.user)); closeAllDrawers(); updateNavbar(); }
        function fillFromProfile() { document.getElementById('c-name').value = state.user.name; document.getElementById('c-phone').value = state.user.phone; }

        function renderAdmin() {
            document.getElementById('admin-inventory').innerHTML = state.products.map(p => `<div class="p-4 flex justify-between"><span>${p.name}</span><span>${inr(p.price)}</span></div>`).join('');
            document.getElementById('admin-orders').innerHTML = state.orders.map(o => `<div class="glass-panel p-4 mb-2">Order #${o.id} - ${o.user} - ${inr(o.total)}</div>`).join('');
        }

        window.onload = () => { renderHome(); updateNavbar(); };
    </script>
</body>
</html>
